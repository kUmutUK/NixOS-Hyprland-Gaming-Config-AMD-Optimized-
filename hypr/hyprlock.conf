# =============================================================================
# Hyprlock Yapılandırması - AMD RX 6700 XT + Catppuccin Mocha
# =============================================================================

general {
    grace = 0
    disable_loading_bar = false
}

background {
    path = ~/Pictures/lockscreen.jpg
    blur_passes = 3
    blur_size = 10
    noise = 0.0117
    brightness = 0.5
    vibrancy = 0.2
}

label {
    position = 0, -65
    size = 250, 50
    halign = center
    valign = center
    text = 
    font_family = JetBrainsMono Nerd Font
    font_size = 15
    color = rgba(203, 166, 247, 1.0)
    shadow_passes = 0
}

input-field {
    position = 0, -120
    size = 300, 50
    halign = center
    valign = center
    placeholder_text =  Şifre...
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    dots_size = 0.55
    dots_spacing = 0.15
    check_symbol = 
    placeholder_color = rgba(166, 173, 200, 0.6)
    font_color = rgba(205, 214, 244, 1.0)
    check_color = rgba(166, 227, 161, 1.0)
    fail_color  = rgba(243, 139, 168, 1.0)
    fail_transition = 300
    hide_input = false
    rounding = 10
    outline_thickness = 2
    outer_color = rgba(166, 173, 200, 0.2)
    inner_color = rgba(30, 30, 46, 0.8)
    shadow_passes = 0
}

label {
    position = 0, 150
    size = 500, 100
    halign = center
    valign = center
    text =  {H:M}
    font_family = JetBrainsMono Nerd Font
    font_size = 80
    font_color = rgba(205, 214, 244, 1.0)
    shadow_passes = 0
}

label {
    position = 0, 60
    size = 500, 50
    halign = center
    valign = center
    text = cmd[update:60000, LC_TIME=tr_TR.UTF-8 date +"%d %B %Y"]
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    font_color = rgba(166, 173, 200, 0.8)
    shadow_passes = 0
}

label {
    position = 0, 10
    size = 500, 50
    halign = center
    valign = center
    text =  {user}
    font_family = JetBrainsMono Nerd Font
    font_size = 15
    font_color = rgba(166, 173, 200, 0.6)
    shadow_passes = 0
}

label {
    position = 20, 20
    size = 200, 50
    halign = left
    valign = top
    text = cmd[update:2000, wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk '{printf "%.0f%%", $2*100}']
    font_family = JetBrainsMono Nerd Font
    font_size = 15
    font_color = rgba(249, 226, 175, 1.0)
    shadow_passes = 0
}

label {
    position = 20, 20
    size = 200, 50
    halign = right
    valign = top
    text = cmd[update:5000, nmcli -t -f NAME,TYPE,STATE con show --active 2>/dev/null | grep -v loopback | head -1 | cut -d: -f1 | xargs -I{} echo " {}" || echo " Bağlı Değil"]
    font_family = JetBrainsMono Nerd Font
    font_size = 15
    font_color = rgba(148, 226, 213, 1.0)
    shadow_passes = 0
}

button {
    position = -20, -20
    size = 50, 50
    halign = right
    valign = bottom
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    text = ⏻
    on_click = wlogout
    font_color = rgba(243, 139, 168, 1.0)
    rounding = 10
    outline_thickness = 2
    outer_color = rgba(243, 139, 168, 0.3)
}

button {
    position = -80, -20
    size = 50, 50
    halign = right
    valign = bottom
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    text = 💤
    on_click = systemctl suspend
    font_color = rgba(166, 173, 200, 1.0)
    rounding = 10
    outline_thickness = 2
    outer_color = rgba(166, 173, 200, 0.3)
}
