    # Renk
    font_color = rgba(166, 173, 200, 0.5)

    # Padding
    padding = 10, 5

    # Arka plan
    # rounding = 8
    # inner_border_size = 0
    # border_size = 1
    # border_color = rgba(166, 173, 200, 0.2)
}

