    font_color = rgba(249, 226, 175, 1.0)

    # Arka plan
    # rounding = 8
    # inner_border_size = 0
    # border_size = 1
    # border_color = rgba(249, 226, 175, 0.2)
}

# =============================================================================
# WİFİ DURUMU
