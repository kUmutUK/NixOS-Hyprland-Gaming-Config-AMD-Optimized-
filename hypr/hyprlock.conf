# =============================================================================
# Hyprlock Yapılandırma Dosyası - 10/10 Mükemmel Kilit Ekranı
# AMD RX 6700 XT + Catppuccin Mocha Teması
# Yazar: MiniMax Agent
# Tarih: 2026-04-04
# =============================================================================

# =============================================================================
# GENEL AYARLAR
# =============================================================================

general {
    # Ekran OFF timeout (saniye)
    # Kilit ekranı açıldıktan sonra ekran kapanma süresi
    # 0 = Asla kapatma
    # 300 = 5 dakika
    # 600 = 10 dakika
    # 1800 = 30 dakika
    screen_off_timeout = 600

    # Kilit modu
    # ByPass = Kilit atlatma (debug için)
    # NoFingerPrint = Parmak izi yok (biyometrik cihazlar için)
    grace = 0

    # Grace timeout (milisaniye)
    # Kilit açıldıktan sonra bu süre içinde tekrar kilit açılabilir
    # 0 = Her zaman şifre gerekli
    grace_timeout = 5

    # Idle timeout (saniye)
    # Bu süre sonunda otomatik kilit
    # 0 = Devre dışı
    idle_timeout = 300

    # Kilit açıldıktan sonra bekleme süresi (saniye)
    # Bu süre içinde tekrar kilit gerektirmez
    # 0 = Her zaman kilit
    # grace_timeout ile birlikte çalışır
    lock_cmd_timeout = 0

    # Arka plan blur
    # Kilit ekranında blur efekti
    background_blur = true

    # VSync
    # Kilit ekranında VSync
    vrr = 0

    # Ekranlayıcı (compositor) bypass
    # true = Hyprland bypass edilir (daha güvenli ama daha yavaş)
    disable_loading_bar = false
}

# =============================================================================
# ARKA PLAN
# =============================================================================

background {
    # Arka plan resmi (path)
    # Boş bırakılırsa mevcut duvar kağıdı kullanılır
    path = /home/localhost/Pictures/lockscreen.jpg

    # Alternatif yollar
    # path = /home/localhost/Pictures/wallhaven-xxx.png
    # path = /nix/store/xxx-wallpaper.png

    # Blur efekti
    blur_pixels = 10
    blur_zones = 3

    # Noise efekti (0-1 arası)
    noise = 0.0117

    # Parlaklık (0-1 arası)
    brightness = 0.5

    # Katman
    # above = En üstte
    # below = Arka planda
    # same = Aynı katmanda
    zpriority = 1

    # Kenar boşlukları
    # matrix = satır,sütun,yatay,diyagonal
    # Örnek: 1,1,0,0 = 1 satır, 1 sütun, yatay 0, diyagonal 0
    # matrix = 1,1,0,0

    # Gradyan renk (path yoksa kullanılır)
    # color = rgba(30, 30, 46, 1.0)

    # Gradyan
    # gradient = 0,rgba(30, 30, 46, 0.8),1,rgba(17, 17, 27, 0.9)
    # gradient = 0,rgba(203, 166, 247, 0.3),1,rgba(137, 180, 250, 0.3)
}

# =============================================================================
# BÜYÜLEYİCİ EFEKT - YILDIZLAR VE UZAY
# =============================================================================

layer_effect {
    name = bouncy

    # Efekt parametreleri
    # Bu efekt Hyprland 0.41+ gerektirir
    # pulse = 1,0,0,1,0.05

    # Çoklu katmanlar için
    # Katman 1: Yıldızlar
    # blur = 0
    # noise = 0.0444
    # color = rgba(255, 255, 255, 0.1)

    # Katman 2: Nebulae
    # blur = 4
    # noise = 0.0222
    # color = rgba(203, 166, 247, 0.05)

    zpriority = 0
}

# =============================================================================
# PAROLA ALANI
# =============================================================================

label {
    # Konum
    monitor =

    # Pozisyon (yüzde olarak)
    # 0,0 = Sol üst
    # 50,50 = Orta
    # 50,80 = Alt orta
    position = 0, 65

    # Boyut
    # w = Genişlik (piksel veya yüzde)
    # h = Yükseklik (piksel)
    size = 250, 50

    # Hizalama
    # left, center, right
    halign = center
    valign = center

    # Metin
    text = 

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 15

    # Renk (Catppuccin Mocha)
    color = rgba(203, 166, 247, 1.0)

    # Overline (üst çizgi)
    # overline_color = rgba(203, 166, 247, 0.5)

    # Text hazır
    # true = "Type password..." vb. metinler gösterilir
    text-placeholder = false

    # Çerçeve
    # true = İnce çerçeve ekle
    outline_thickness = 0

    # Çerçeve yarıçapı
    rounding = 10

    # Çerçeve rengi
    border_color = rgba(203, 166, 247, 0.3)
    border_size = 2

    # PPTX stili (gölge efekti)
    shadow_passes = 0
    shadow_boost = 0.0
}

# =============================================================================
# ŞİFRE GİRİŞ ALANI
# =============================================================================

input-field {
    # Konum
    monitor =

    # Pozisyon
    position = 0, 72

    # Boyut
    size = 300, 50

    # Hizalama
    halign = center
    valign = center

    # Placeholder metin
    placeholder_text =  Şifre...

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    # Şifre karakteri (gizli karakter)
    dots_size = 0.55
    dots_spacing = 0.15
    check_symbol = 

    # Placeholder rengi
    placeholder_color = rgba(166, 173, 200, 0.6)

    # Aktif şifre rengi (yazarken)
    font_color = rgba(205, 214, 244, 1.0)

    # Doğru şifre animasyonu
    on_input_ok_color = rgba(166, 227, 161, 1.0)
    on_input_fail_color = rgba(243, 139, 168, 1.0)

    # Deneme sayısı
    fail_transition = 300ms

    # Ekran okuyucu (screen reader) erişimi
    # true = Erişilebilir
    # false = Güvenli
    accessible = false

    # Büyük harf göstergesi
    show_password = true

    # Yuvarlak köşeler
    rounding = 10

    # Çerçeve
    border_size = 2
    border_color = rgba(166, 173, 200, 0.2)

    # Odak çerçeve rengi
    inner_border_color = rgba(166, 173, 200, 0.1)
    inner_border_size = 0

    # Gölge
    shadow_passes = 0

    # Ust üstte çizgi
    # overline = true
    # overline_color = rgba(166, 173, 200, 0.2)
}

# =============================================================================
# SAAT
# =============================================================================

label {
    monitor =

    # Pozisyon
    position = 0, 35

    # Boyut
    size = 500, 100

    # Hizalama
    halign = center
    valign = center

    # Saat formatı
    # {H:M} = 24 saat
    # {h:M} = 12 saat
    # {AM/PM} = Öğleden önce/sonra
    text =   {H:M}

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 80
    font_color = rgba(205, 214, 244, 1.0)

    # Yazı tipi ağırlığı
    # font_weight = 700

    # Gölge
    shadow_passes = 0

    # Overline
    overline = true
    overline_color = rgba(166, 173, 200, 0.2)
}

# =============================================================================
# TARİH
# =============================================================================

label {
    monitor =

    # Pozisyon
    position = 0, 48

    # Boyut
    size = 500, 50

    # Hizalama
    halign = center
    valign = center

    # Tarih formatı
    # {d} = Gün
    # {m} = Ay
    # {yyyy} = Yıl
    text = {d} {m} {yyyy}

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20
    font_color = rgba(166, 173, 200, 0.8)

    # Gölge
    shadow_passes = 0
}

# =============================================================================
# KULLANICI ADI
# =============================================================================

label {
    monitor =

    # Pozisyon
    position = 0, 25

    # Boyut
    size = 500, 50

    # Hizalama
    halign = center
    valign = center

    # Kullanıcı adı
    # {user} = Mevcut kullanıcı adı
    text =   {user}

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 15
    font_color = rgba(166, 173, 200, 0.6)

    # Gölge
