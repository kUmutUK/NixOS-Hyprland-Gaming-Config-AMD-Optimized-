# =============================================================================
# HIZLI EYLEMLER BUTONLARI
# =============================================================================

# Güç menüsü butonu
button {
    monitor =

    # Pozisyon (sağ alt)
    position = -100, -100

    # Boyut
    size = 50, 50

    # Hizalama
    halign = center
    valign = center

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    # İkon
    text = ⏻

    # Tıklandığında
    # wlogout = Güç menüsü
    # systemctl suspend = Uyku
    # systemctl reboot = Yeniden başlat
    # systemctl poweroff = Kapat
    on_click = wlogout

    # Renkler
    font_color = rgba(243, 139, 168, 1.0)
    hover_color = rgba(243, 139, 168, 0.8)
    pressed_color = rgba(243, 139, 168, 1.0)

    # Arka plan
    rounding = 10
    border_size = 2
    border_color = rgba(243, 139, 168, 0.3)

    # Hover arka plan
    # inner_border_size = 0
}

# Uyku butonu
button {
    monitor =

    # Pozisyon (sağ alt, güç yanında)
    position = -170, -100

    # Boyut
    size = 50, 50

    # Hizalama
    halign = center
    valign = center

    # Font
    font_family = JetBrainsMono Nerd Font
    font_size = 20

    # İkon
    text = 💤

    # Tıklandığında
    on_click = systemctl suspend

    # Renkler
    font_color = rgba(166, 173, 200, 1.0)
    hover_color = rgba(166, 173, 200, 0.8)
    pressed_color = rgba(166, 173, 200, 1.0)

    # Arka plan
    rounding = 10
    border_size = 2
    border_color = rgba(166, 173, 200, 0.3)
}

