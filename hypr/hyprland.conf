# HYPRLAND CONF - PERFORMANCE + 170HZ + AMD

################
# MONITOR
################
monitor = ,preferred,auto,1

################
# ENV - AMD + VULKAN
################
env = XCURSOR_THEME,Adwaita
env = XCURSOR_SIZE,24

env = AMD_VULKAN_ICD,RADV
env = RADV_PERFTEST,gpl,nggc

env = MESA_VK_WSI_PRESENT_MODE,mailbox

# CS2 Low Latency
env = __GL_SYNC_TO_VBLANK,0
env = __GL_GSYNC_ALLOWED,0

################
# INPUT
################
input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    force_no_accel = true
}

################
# GENERAL
################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(00d4ffee) rgba(a855f7ee) 45deg
    col.inactive_border = rgba(1e1e2eaa)

    layout = dwindle
    allow_tearing = true
}

################
# DECORATION (FPS MODE)
################
decoration {
    rounding = 10

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    dim_inactive = false
}

################
# ANIMATIONS (LIGHTWEIGHT)
################
animations {
    enabled = yes

    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windowsIn, 1, 4, smooth, popin 80%
    animation = windowsOut, 1, 3, smooth
    animation = fade, 1, 3, smooth
    animation = workspaces, 1, 4, smooth
}

################
# RENDER
################
render {
    direct_scanout = true
}

################
# MISC
################
misc {
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

################
# CURSOR
################
cursor {
    no_hardware_cursors = false
    inactive_timeout = 3
}

################
# KEYBINDS
################
$mainMod = SUPER
bind = $mainMod, A, exec, rofi -show drun -theme arthur
bind = $mainMod, C, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

################
# WINDOW RULES (GAMING)
################
windowrulev2 = immediate, class:^(cs2)$
windowrulev2 = fullscreen, class:^(cs2)$
windowrulev2 = noblur, class:^(cs2)$
windowrulev2 = noshadow, class:^(cs2)$
windowrulev2 = nodim, class:^(cs2)$
windowrulev2 = noanim, class:^(cs2)$
windowrulev2 = norounding, class:^(cs2)$
windowrulev2 = noborder, class:^(cs2)$

windowrulev2 = immediate, class:^(gamescope)$
windowrulev2 = fullscreen, class:^(gamescope)$
windowrulev2 = noblur, class:^(gamescope)$
windowrulev2 = noshadow, class:^(gamescope)$
windowrulev2 = noanim, class:^(gamescope)$

################
# AUTOSTART
################
exec-once = waybar
exec-once = dunst
exec-once = swww-daemon
exec-once = swww img ~/Downloads/wallpaper.jpg
exec-once = wl-paste --watch cliphist store
exec-once = nm-applet --indicator
