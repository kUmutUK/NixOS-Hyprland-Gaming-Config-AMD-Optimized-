# ===========================================================================
# hyprland.conf — PERFORMANCE + 170HZ + AMD
# ===========================================================================

################
# MONITOR
################
# Fiziksel monitör — preferred çözünürlük ve yenileme hızı otomatik.
monitor = ,preferred,auto,1

# GPU Passthrough Headless Monitor Fix
# VM çalışırken Hyprland'a headless sanal çıkış oluşturulur;
# VFIO hook GPU'yu alınca fiziksel ekran yerine headless aktif olur.
exec-once = hyprctl output create headless

# Headless sanal monitör — VM görüntüsü için (looking-glass veya SPICE)
# Çözünürlüğü VM XML'indeki video aygıtıyla eşleştir.
monitor = HEADLESS-1,1920x1080@60,auto,1

################
# ENV — AMD + VULKAN
################
env = XCURSOR_SIZE,16
env = XCURSOR_THEME,plus-cursor

# NOT: AMD_VULKAN_ICD ve RADV_PERFTEST configuration.nix'teki
# environment.variables üzerinden sistem genelinde set edilir.
# Burada tekrar tanımlamak gerekmez; daha önce buradaki
# "env = RADV_PERFTEST,gpl,nggc" satırı Hyprland'ın virgül
# parse etmesi nedeniyle "RADV_PERFTEST=gpl" olarak işleniyordu
# ve "nggc" kayboluyordu. FIX: Bu satır kaldırıldı.

################
# INPUT
################
input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
    force_no_accel = true
}

################
# GENERAL
################
general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2

    col.active_border = rgba(00d4ffee) rgba(a855f7ee) 45deg
    col.inactive_border = rgba(1e1e2eaa)

    layout = dwindle
    allow_tearing = true
}

################
# DECORATION (FPS MODE)
################
decoration {
    rounding = 10

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }

    dim_inactive = false
}

################
# ANIMATIONS (LIGHTWEIGHT)
################
animations {
    enabled = yes

    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windowsIn,  1, 4, smooth, popin 80%
    animation = windowsOut, 1, 3, smooth
    animation = fade,       1, 3, smooth
    animation = workspaces, 1, 4, smooth
}

################
# MISC
################
misc {
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    key_press_enables_dpms  = true
    disable_hyprland_logo   = true
    disable_splash_rendering = true
    force_default_wallpaper  = 0
    animate_manual_resizes       = false
    animate_mouse_windowdragging = false
}

################
# CURSOR
################
cursor {
    no_hardware_cursors = false
    inactive_timeout    = 3
}

################
# KEYBINDS
################
$mainMod = SUPER
bind = $mainMod, A, exec, rofi -show drun -theme arthur
bind = $mainMod, W, exec, waypaper
bind = $mainMod, C, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, L, exec, hyprlock

# Pencere taşıma (ok tuşları ile)
bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

# Focus yön değiştirme
bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# Pencere boyutlandırma (CTRL+SUPER + ok tuşları)
binde = $mainMod CTRL, right, resizeactive,  40   0
binde = $mainMod CTRL, left,  resizeactive, -40   0
binde = $mainMod CTRL, up,    resizeactive,   0 -40
binde = $mainMod CTRL, down,  resizeactive,   0  40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

################
# WINDOW RULES (GAMING)
################
# CS2 – tüm gaming optimizasyonları tek blokta
windowrule {
    name = cs2_gaming
    match:class = ^(cs2)$
    immediate   = on
    fullscreen  = on
    no_blur     = on
    no_shadow   = on
    no_anim     = on
    rounding    = 0
}

# Gamescope
windowrule {
    name = gamescope_gaming
    match:class = ^(gamescope)$
    immediate  = on
    fullscreen = on
    no_blur    = on
    no_shadow  = on
    no_anim    = on
}

################
# AUTOSTART
################

exec-once = waybar
exec-once = dunst
# FIX [YENİ]: swww-daemon artık systemd user service olarak yönetiliyor
# (home.nix: systemd.user.services.swww-daemon).
# Buradan exec-once ile başlatmak gerekmiyor; systemd graphical-session
# hedefiyle otomatik başlar ve Restart=on-failure koruması altındadır.
# exec-once = swww-daemon  ← KALDIRILDI

exec-once = waypaper --restore
exec-once = wl-paste --watch cliphist store
exec-once = nm-applet --indicator

# FIX: global.sh'taki tüm tweakler NixOS'a taşındı:
#   - sysctl ayarları  → configuration.nix boot.kernel.sysctl
#   - env değişkenleri → configuration.nix environment.variables
#   - CPU governor     → configuration.nix services.power-profiles-daemon
# Bu satır artık gerekli değil ve kaldırıldı.

exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1

# Wallpaper rotasyonu home.nix systemd.user.timers.waypaper-random ile yönetiliyor.
