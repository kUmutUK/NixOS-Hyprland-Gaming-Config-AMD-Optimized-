# ===========================================================================
# hyprland.conf — PERFORMANCE + 170HZ + AMD + Dinamik Headless
# ===========================================================================

monitor = ,preferred,auto,1

# Headless output (adını dinamik al, ama workspace'leri fiziksel ekrana sabitle)
exec-once = hyprctl output create headless
exec-once = sleep 0.5; HEADLESS=$(hyprctl monitors -j | jq -r '.[] | select(.name | startswith("HEADLESS")) | .name'); if [ -n "$HEADLESS" ]; then hyprctl keyword monitor "$HEADLESS,1920x1080@60,auto,1"; fi

# Workspace pinning → hepsi DP-3 (fiziksel monitör)
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3
workspace = 4, monitor:DP-3
workspace = 5, monitor:DP-3

env = XCURSOR_SIZE,16
env = XCURSOR_THEME,capitaine-cursors

input {
    kb_layout = tr
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat
}

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 2
    col.active_border = rgba(00d4ffee) rgba(a855f7ee) 45deg
    col.inactive_border = rgba(1e1e2eaa)
    layout = dwindle
    allow_tearing = true
}

decoration {
    rounding = 10
    dim_inactive = false
}

animations {
    enabled = true
    bezier = smooth, 0.25, 0.1, 0.25, 1.0
    animation = windowsIn,  1, 4, smooth, popin 80%
    animation = windowsOut, 1, 3, smooth
    animation = fade,       1, 3, smooth
    animation = workspaces, 1, 4, smooth
}

misc {
    vfr = true
    vrr = 2
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
}

cursor {
    no_hardware_cursors = false
    inactive_timeout = 3
}

$mainMod = SUPER

bind = $mainMod, A, exec, rofi -show drun -theme arthur
bind = $mainMod, W, exec, waypaper
bind = $mainMod, C, exec, kitty
bind = $mainMod, Q, killactive
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy
bind = $mainMod, L, exec, hyprlock

bind = $mainMod SHIFT, left,  movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up,    movewindow, u
bind = $mainMod SHIFT, down,  movewindow, d

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

binde = $mainMod CTRL, right, resizeactive,  40   0
binde = $mainMod CTRL, left,  resizeactive, -40   0
binde = $mainMod CTRL, up,    resizeactive,   0 -40
binde = $mainMod CTRL, down,  resizeactive,   0  40

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

windowrule = match:class ^(cs2)$, immediate on, fullscreen on, no_blur on, no_shadow on, no_anim on, rounding 0
windowrule = match:class ^(gamescope)$, immediate on, fullscreen on, no_blur on, no_shadow on, no_anim on, rounding 0

exec-once = hyprctl setcursor capitaine-cursors 16
exec-once = waybar
exec-once = dunst
exec-once = waypaper --restore
exec-once = wl-paste --watch cliphist store
exec-once = nm-applet --indicator
exec-once = /run/current-system/sw/libexec/polkit-gnome-authentication-agent-1
