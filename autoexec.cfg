/////////////////////////////////////
// 🎯 CS:GO AUTOEXEC – 10/10
/////////////////////////////////////

host_writeconfig

// 🎯 Mouse
sensitivity "1.13"
zoom_sensitivity_ratio_mouse "0.5"
m_rawinput "1"
m_customaccel "0"

// 🎮 FPS & Performans (PC zorlanmaz, 170 Hz için ideal)
fps_max "300"
mat_queue_mode "2"

// 🌐 Netcode (iyi internet)
rate "786432"
cl_cmdrate "128"
cl_updaterate "128"
cl_interp "0"
cl_interp_ratio "1"

// 🔫 Viewmodel
viewmodel_fov "68"
viewmodel_offset_x "2.5"
viewmodel_offset_y "2"
viewmodel_offset_z "-2"

// 🔄 Bob (minimum sallanma)
cl_bob_lower_amt "5"
cl_bobamt_lat "0.1"
cl_bobamt_vert "0.1"
cl_bobcycle "2"

// 🎯 Crosshair (temiz, statik)
cl_crosshairstyle "4"
cl_crosshairsize "2.5"
cl_crosshairthickness "0.5"
cl_crosshairgap "-2"
cl_crosshair_drawoutline "0"

// 🔊 Ses (Pipewire düşük gecikme)
volume "0.5"
snd_mixahead "0.05"

// 🎮 Keybindler
bind "mwheelup" "+jump"
bind "mwheeldown" "+jump"
bind "space" "+jump"

bind "shift" "+speed"
bind "ctrl" "+duck"

bind "mouse4" "slot7"
bind "mouse5" "slot8"

bind "q" "lastinv"
bind "c" "use weapon_c4; drop"

// 🗺️ Radar
cl_radar_always_centered "0"
cl_radar_scale "0.4"
cl_hud_radar_scale "1.15"

// 🧼 Görsel temizlik
cl_autohelp "0"
gameinstructor_enable "0"

// 🎯 Recoil crosshair toggle
bind "t" "toggle cl_crosshair_recoil 0 1"

echo "CFG 10/10 Yüklendi!"
